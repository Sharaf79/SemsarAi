version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: semsar-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-semsar_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-semsar_ai}
      MYSQL_USER: ${MYSQL_USER:-semsar}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-semsar_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  nlp-service:
    build:
      context: ../nlp-service
      dockerfile: Dockerfile
    container_name: semsar-nlp
    restart: unless-stopped
    ports:
      - '8001:8001'
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: '8001'
      # Phase A (stub classifier) — no model loading. Change to 'false' after training.
      USE_STUB_CLASSIFIER: '${USE_STUB_CLASSIFIER:-true}'
      MODEL_PATH: /app/model
      BASE_MODEL: distilbert-base-multilingual-cased
      CONFIDENCE_FLOOR: '0.55'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 30s
      timeout: 5s
      retries: 3
    # Uncomment to mount pre-trained model from host (if available)
    # volumes:
    #   - ./nlp-service/model:/app/model:ro

volumes:
  mysql_data:
