version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: semsar-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-semsar_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-semsar_ai}
      MYSQL_USER: ${MYSQL_USER:-semsar}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-semsar_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
